<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 標籤產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qr-creator@1.0.0/dist/qr-creator.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--border:#e2e0d8;--text:#1a1917;--muted:#7a7870;--accent:#1a1917;--r:8px;--rl:12px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 20px}
.container{max-width:820px;margin:0 auto}
header{margin-bottom:32px}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
header p{font-size:13px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
@media(max-width:500px){.fields{grid-template-columns:1fr}}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.field input{width:100%;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.section-head span{font-size:12px;font-weight:500;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
.sel-btns{display:flex;gap:6px}
.sel-btns button{font-size:11px;padding:2px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .1s}
.sel-btns button:hover{border-color:var(--accent);color:var(--text)}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);color:var(--text);user-select:none;transition:all .12s;font-family:'JetBrains Mono',monospace}
.chip:hover{border-color:#999}
.chip.on{background:#1a1917;color:#fff;border-color:#1a1917}
.count-row{display:flex;align-items:center;margin:16px 0}
.count-badge{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.count-badge strong{color:var(--text);font-weight:600}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--r);border:1px solid var(--border);font-size:14px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s;font-weight:500}
.btn:hover{background:var(--bg)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.85}
.prog-wrap{margin-top:14px;display:none}
.prog-track{background:var(--border);border-radius:4px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .2s;width:0%}
.prog-text{font-size:12px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace}
.preview-wrap{margin-top:16px;overflow-x:auto;background:var(--bg);border-radius:var(--r);padding:14px;display:flex;gap:10px;min-height:130px;align-items:flex-start}
.preview-empty{font-size:13px;color:var(--muted);align-self:center;padding:0 8px}
.thumb{flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:5px;width:90px}
.thumb canvas{width:70px!important;height:70px!important;display:block}
.thumb-lbl{font-size:10px;color:#555;text-align:center;line-height:1.5;font-family:'JetBrains Mono',monospace;white-space:pre}
.more-badge{flex-shrink:0;align-self:center;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:0 8px}
@media print{
  body{background:#fff;padding:0}
  .container{display:none!important}
  #print-root{display:block!important}
}
#print-root{display:none}
#print-root .pg{width:210mm;height:297mm;page-break-after:always;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff}
#print-root .pg:last-child{page-break-after:avoid}
#print-root .pg canvas{width:150mm!important;height:150mm!important;display:block}
#print-root .pg .p-name{font-family:'Noto Sans TC',sans-serif;font-size:14pt;color:#999;margin-top:12mm}
#print-root .pg .p-floor{font-family:'Noto Sans TC',sans-serif;font-size:28pt;font-weight:500;margin-top:4mm}
#print-root .pg .p-room{font-family:'Noto Sans TC',sans-serif;font-size:64pt;font-weight:700;margin-top:2mm;letter-spacing:-1pt}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>#QRcode 標籤產生器 </h1>
    <p>Eagle AI · 批次產生 A4 工地標籤 </p>
  </header>
  <div class="card">
    <div class="card-title">工程資訊</div>
    <div class="fields">
      <div class="field"><label>constructionId</label><input type="text" id="cid" value="3518b017-3160-4f58-b514-c953d6af88b3"></div>
      <div class="field"><label>constructionName</label><input type="text" id="cname" value="大同案"></div>
    </div>
    <div class="section-head"><span>樓層 Floor</span><div class="sel-btns"><button onclick="selAll('floor')">全選</button><button onclick="selNone('floor')">清除</button></div></div>
    <div class="chip-group" id="floor-group"></div>
    <div class="section-head"><span>房間 Room</span><div class="sel-btns"><button onclick="selAll('room')">全選</button><button onclick="selNone('room')">清除</button></div></div>
    <div class="chip-group" id="room-group"></div>
  </div>
  <div class="count-row"><div class="count-badge" id="count-badge">請選擇樓層與戶別</div></div>
  <div class="preview-wrap" id="preview-wrap"><span class="preview-empty">選擇後預覽</span></div>
  <div style="margin-top:20px">
    <div class="actions">
      <button class="btn primary" id="btn-print" onclick="doPrint()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        列印 / 儲存 PDF
      </button>
      <button class="btn" id="btn-zip" onclick="doZip()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下載全部 PNG (ZIP)
      </button>
    </div>
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="prog-text" id="prog-text"></div>
    </div>
  </div>
</div>
<div id="print-root"></div>
<script>
const floors=["FND","B5","B4","B3","B2","B1","1F","2F","3F","4F","5F","6F","7F","8F","9F","10F","11F","12F","13F","14F","15F","RF"];
const rooms=["公共區域","全樓層","A1","A2","A3","A5","A6","A7","A8","A11"];
const sel={floor:new Set(),room:new Set()};

function renderChips(type,items,id){
  const c=document.getElementById(id);c.innerHTML='';
  items.forEach(v=>{
    const el=document.createElement('span');
    el.className='chip'+(sel[type].has(v)?' on':'');
    el.textContent=v;
    el.onclick=()=>{sel[type].has(v)?sel[type].delete(v):sel[type].add(v);el.classList.toggle('on');refresh();};
    c.appendChild(el);
  });
}
function selAll(t){(t==='floor'?floors:rooms).forEach(v=>sel[t].add(v));renderChips(t,t==='floor'?floors:rooms,t+'-group');refresh();}
function selNone(t){sel[t].clear();renderChips(t,t==='floor'?floors:rooms,t+'-group');refresh();}
function getPairs(){
  const p=[];
  floors.forEach(f=>{if(!sel.floor.has(f))return;rooms.forEach(r=>{if(sel.room.has(r))p.push({floor:f,room:r});});});
  return p;
}
function makePayload(floor,room){
  return JSON.stringify({constructionId:document.getElementById('cid').value.trim(),constructionName:document.getElementById('cname').value.trim(),floor,room});
}
function makeQR(text,size){
  const c=document.createElement('canvas');
  c.width=size;c.height=size;
  QrCreator.render({text,radius:0,ecLevel:'M',fill:'#000000',background:'#ffffff',size},c);
  return c;
}
function refresh(){
  const pairs=getPairs();
  const badge=document.getElementById('count-badge');
  const wrap=document.getElementById('preview-wrap');
  document.getElementById('btn-print').disabled=pairs.length===0;
  document.getElementById('btn-zip').disabled=pairs.length===0;
  if(!pairs.length){badge.innerHTML='請選擇樓層與區域';wrap.innerHTML='<span class="preview-empty">選擇後預覽</span>';return;}
  badge.innerHTML=`共 <strong>${pairs.length}</strong> 張標籤`;
  wrap.innerHTML='';
  pairs.slice(0,16).forEach(({floor,room})=>{
    const card=document.createElement('div');card.className='thumb';
    const qc=makeQR(makePayload(floor,room),70);
    const lbl=document.createElement('div');lbl.className='thumb-lbl';lbl.textContent=floor+'\n'+room;
    card.appendChild(qc);card.appendChild(lbl);wrap.appendChild(card);
  });
  if(pairs.length>16){const m=document.createElement('span');m.className='more-badge';m.textContent=`+${pairs.length-16} 張`;wrap.appendChild(m);}
}
function setProgress(i,total,msg){
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('prog-bar').style.width=(total>0?Math.round(i/total*100):0)+'%';
  document.getElementById('prog-text').textContent=msg;
}
function setBtns(d){document.getElementById('btn-print').disabled=d;document.getElementById('btn-zip').disabled=d;}
function yieldUI(){return new Promise(r=>setTimeout(r,0));}

async function doZip(){
  const pairs=getPairs();if(!pairs.length)return;
  const cname=document.getElementById('cname').value.trim();
  setBtns(true);
  const zip=new JSZip();
  for(let i=0;i<pairs.length;i++){
    const{floor,room}=pairs[i];
    setProgress(i,pairs.length,`產生中 ${i+1} / ${pairs.length}　${floor} ${room}`);
    await yieldUI();
    const W=1240,H=1754,QS=660;
    const qc=makeQR(makePayload(floor,room),QS);
    const c=document.createElement('canvas');c.width=W;c.height=H;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
    ctx.drawImage(qc,(W-QS)/2,220);
    ctx.textAlign='center';
    ctx.fillStyle='#999';ctx.font='400 40px sans-serif';ctx.fillText(cname,W/2,220+QS+80);
    ctx.fillStyle='#111';ctx.font='500 70px sans-serif';ctx.fillText(floor,W/2,220+QS+185);
    ctx.font='700 160px sans-serif';ctx.fillText(room,W/2,220+QS+385);
    const blob=await new Promise(r=>c.toBlob(r,'image/png'));
    zip.file((floor+'_'+room+'.png').replace(/\//g,'-'),blob);
  }
  setProgress(pairs.length,pairs.length,'ZIP 打包中...');
  const content=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(content);a.download=cname+'_QR標籤.zip';a.click();
  setProgress(pairs.length,pairs.length,'完成！共 '+pairs.length+' 張 PNG');
  setBtns(false);
}

async function doPrint(){
  const pairs=getPairs();if(!pairs.length)return;
  const cname=document.getElementById('cname').value.trim();
  setBtns(true);
  const root=document.getElementById('print-root');root.innerHTML='';
  for(let i=0;i<pairs.length;i++){
    const{floor,room}=pairs[i];
    setProgress(i,pairs.length,'準備列印 '+(i+1)+' / '+pairs.length+'　'+floor+' '+room);
    await yieldUI();
    const qc=makeQR(makePayload(floor,room),566);
    const pg=document.createElement('div');pg.className='pg';
    const pn=document.createElement('div');pn.className='p-name';pn.textContent=cname;
    const pf=document.createElement('div');pf.className='p-floor';pf.textContent=floor;
    const pr=document.createElement('div');pr.className='p-room';pr.textContent=room;
    pg.appendChild(qc);pg.appendChild(pn);pg.appendChild(pf);pg.appendChild(pr);
    root.appendChild(pg);
  }
  setProgress(pairs.length,pairs.length,'開啟列印...');
  await new Promise(r=>setTimeout(r,300));
  window.print();
  setProgress(pairs.length,pairs.length,'完成！共 '+pairs.length+' 張');
  setBtns(false);
}

renderChips('floor',floors,'floor-group');
renderChips('room',rooms,'room-group');
</script>
</body>
</html>
